name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run vendor
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run lint:webext
      - uses: actions/upload-artifact@v5
        with:
          name: extension-zips
          path: dist/*.zip
          if-no-files-found: error
